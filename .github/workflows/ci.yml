name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint (ESLint)
        working-directory: frontend
        run: npx eslint src/ --max-warnings 0

      - name: Frontend type check (TypeScript)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Go vet
        working-directory: backend
        run: go vet ./...

      - name: Go build
        working-directory: backend
        run: go build ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.base_ref == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.21.2_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Run Gitleaks
        run: ./gitleaks detect --source . --verbose --redact --gitleaks-ignore-path .gitleaksignore
